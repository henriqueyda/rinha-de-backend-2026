events {
    worker_connections 4096;
}

http {
    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 1024;
        keepalive_requests 100000;
    }
    access_log off; 
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}



