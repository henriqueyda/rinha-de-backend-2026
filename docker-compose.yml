services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "32MB"

  api1:
    build: .
    hostname: api1
    ports:
      - "8081:8080"
      - "6061:6060"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"

  api2:
    build: .
    hostname: api2
    ports:
      - "8082:8080"
      - "6062:6060"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"